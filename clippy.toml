# Parser modules opt into deny(clippy::unwrap_used / expect_used / indexing_slicing
# / panic) to keep panic-prone constructs out of the untrusted-input ICC/CGATS
# parse paths (a panic there is a denial-of-service on a server-side pipeline).
# Test code legitimately unwraps/expects on known-good fixtures, so exempt it.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
