name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test + lint (differential vs lcms2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The rcms-oracle crate cc-builds the vendored C lcms2 submodule.
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (full differential suite)
        run: cargo test --workspace

  wasm:
    name: wasm32 build (shipped crate, no C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No submodules: the wasm build excludes the test-only oracle.

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build rcms for wasm32
        run: cargo build -p rcms --target wasm32-unknown-unknown
